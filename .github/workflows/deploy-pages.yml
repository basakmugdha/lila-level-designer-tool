# Build and deploy the telemetry viewer to GitHub Pages (static site, no backend).
# Repo must have frontend/public/data/ populated (run scripts/export_static_data.py locally and commit).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          export VITE_USE_STATIC=true
          export VITE_BASE_URL=./
          npm run build:pages
        env:
          VITE_USE_STATIC: 'true'
          VITE_BASE_URL: './'

      - name: Verify built index (relative asset paths)
        run: |
          echo "=== Built index.html (first 25 lines) ==="
          head -25 frontend/dist/index.html
          echo ""
          echo "=== Checking asset paths are relative ==="
          grep -E 'href="\./|src="\./' frontend/dist/index.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
